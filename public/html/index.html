<!DOCTYPE html>
<html>
<header>
    <title>3Dfy your image - ONNX runtime demo</title>
</header>

<head>
    <link rel="stylesheet" href="index.css">
</head>

<body style="background-color:rgb(10, 11, 28)">
    <div id="loading-model-progress" style="margin-top: 20%;">
        <img src="spinner.gif" class="modelLoadIndicator">
        <p>Loading AI model...</p>
        <progress id="download-progress" value="0" max="100" style="margin: auto;"></progress>
    </div>
    <div id="select-file" style="display:none; margin-top: 20%; justify-content: center; height: fit-content;">
        <input type="file" id="fileElem" accept="image/*" style="display:none" />
        <a href="#" id="fileSelect" style="align-self: center;">Select Image*</a> <br>
        <input type="url" id="url-input" placeholder="URL to image"
            style="width: 30%; align-self: center; display:block; margin: auto;" /><br>
        <a href="#" id="select-url" style="align-self: center;">Or use URL</a>
        <p class="description">*image will not leave your device</p>
        <canvas id="output-view" style="display: none;"></canvas>
        <canvas id="gl-canvas" width="800" height="600"
            style="margin: auto; display: none; width: auto; height: 50vh;"></canvas>
    </div>
    <div id="processing-data-progress" style="display: none; margin-top: 20%;">
        <img src="spinner.gif" class="modelLoadIndicator">
        <p>Using AI to extract depth...</p>
    </div>
    <div class="logo-container">
        <img src="e1.png">
    </div>
    </footer>
    <!-- import ONNXRuntime Web from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"
        integrity="sha512-zhHQR0/H5SEBL3Wn6yYSaTTZej12z0hVZKOv3TwCUXT1z5qeqGcXJLLrbERYRScEDDpYIJhPC1fk31gqR783iQ=="
        crossorigin="anonymous" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <script type="text/javascript" src="index.js"></script>

</body>


</html>
