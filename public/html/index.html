<!DOCTYPE html>
<html>
<header>
    <title>3Dfy your image - ONNX runtime demo</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</header>

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CR8RMELVZT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-CR8RMELVZT');
    </script>
    <link rel="stylesheet" href="index.css">
</head>

<body style="background-color:rgb(10, 11, 28)">
    <div id="loading-model-progress" style="margin-top:20%;">
        <img src="spinner.gif" class="model-load-indicator">
        <p>Loading AI model...</p>
        <progress id="download-progress" value="0" max="100" style="margin:auto;"></progress>
    </div>
    <div id="select-file">
        <input type="file" id="file-elem" accept="image/*" style="display:none" />
        <a href="#" id="file-select-button" class="button">Select Image*</a> <br>
        <input type="url" id="url-input" placeholder="URL to image" /><br>
        <a href="#" id="select-url" class="button">Or use URL</a>
        <p class="description">*image will not leave your device</p>
        <canvas id="staging-canvas" style="display:none;"></canvas>
        <canvas id="gl-canvas" width="800" height="600"></canvas>
    </div>
    <div id="processing-data-progress" style="display:none;margin-top:20%;">
        <img src="spinner.gif" class="model-load-indicator">
        <p>Using AI to extract depth...</p>
    </div>
    <div class="logo-container">
        <a href="mailto:contact@elasticone.com" class="mail"><img src="e1.png" class="logo"></a>
    </div>
    </footer>
    <!-- import ONNXRuntime Web from CDN -->

        integrity="sha512-zhHQR0/H5SEBL3Wn6yYSaTTZej12z0hVZKOv3TwCUXT1z5qeqGcXJLLrbERYRScEDDpYIJhPC1fk31gqR783iQ=="
        crossorigin="anonymous" defer></script>

    <script type="text/javascript" src="index.js"></script>
</body>

</html>
